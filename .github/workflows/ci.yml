# SovereignShield CI — lint, typecheck, test, security
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pip-audit
          pip install -e ".[dev]" 2>/dev/null || pip install -r Artifacts/project/sovereignshield/requirements.txt
          pip install chromadb sentence-transformers pandas 2>/dev/null || true

      - name: Ruff lint
        run: ruff check Artifacts/project/sovereignshield/

      - name: Mypy typecheck
        run: PYTHONPATH=Artifacts mypy Artifacts/project/sovereignshield/ --strict --ignore-missing-imports

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Pytest
        run: PYTHONPATH=Artifacts pytest Artifacts/project/sovereignshield/tests/ -v --tb=short --cov=project.sovereignshield --cov-report=term-missing

      - name: Security audit
        run: pip-audit
