# SovereignShield CI — lint, type-check, pytest
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Ruff lint
        run: ruff check . --config pyproject.toml

      - name: Mypy type-check
        run: mypy app.py --config-file pyproject.toml

      - name: Pytest
        run: pytest Artifacts/project/sovereignshield/tests/ -v --tb=short
